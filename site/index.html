<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Přehled mých aktivit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0d5f5f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .cell { width: 14px; height: 14px; border-radius: 2px; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.8); }
    .cell:hover { transform: scale(1.3); opacity: 1 !important; }
    .activity-menu { position: fixed; background: #0f3a3a; border: 1px solid #1a5a5a; border-radius: 8px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .activity-menu-item { padding: 10px 16px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #334155; }
    .activity-menu-item:last-child { border-bottom: none; }
    .activity-menu-item:hover { background: #334155; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 pb-6 border-b border-teal-700">
      <h1 class="text-4xl font-bold text-white mb-2">Activity Heatmaps</h1>
      <p class="text-slate-200">Přehled mých aktivit</p>
    </header>

    <!-- FILTRY -->
    <aside class="mb-8 p-4 bg-teal-900 rounded-lg border border-teal-700">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <h3 class="text-sm font-semibold text-slate-200 uppercase mb-3">Roky</h3>
          <div id="yearFilter" class="flex flex-wrap gap-2"></div>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-200 uppercase mb-3">Aktivita</h3>
          <div id="typeFilter" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto"></div>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-200 uppercase mb-3">Akce</h3>
          <div class="flex flex-col gap-2">
            <button id="toggleDaysBtn" class="px-4 py-2 bg-teal-700 text-slate-200 rounded hover:bg-teal-600 text-sm font-medium">
              Všechny dny
            </button>
            <button id="resetBtn" class="px-4 py-2 bg-red-900 text-red-100 rounded hover:bg-red-800 text-sm font-medium">
              Reset
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- STATISTIKY -->
    <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

    <!-- HEATMAPY -->
    <div id="heatmapsContainer" class="space-y-8"></div>

    <!-- FOOTER -->
    <footer class="text-center text-sm text-slate-100 py-8 border-t border-teal-700 mt-12">
      Powered by <a href="https://github.com/aspain/git-sweaty" class="text-cyan-400 hover:text-cyan-300">git-sweaty</a>
    </footer>
  </div>

  <script>
    let allData = {};
    let selectedYears = new Set();
    let selectedTypes = new Set();
    let showAllDays = true;

    async function init() {
      const res = await fetch('data.json');
      allData = await res.json();
      
      selectedYears = new Set(allData.years);
      
      // Výchozí: pouze cyklistické aktivity
      const cyclingActivities = ['Ride', 'VirtualRide', 'GravelRide', 'MountainBikeRide', 'EBikeRide'];
      selectedTypes = new Set(allData.types.filter(t => cyclingActivities.includes(t)));
      
      renderFilters();
      render();
    }

    function renderFilters() {
      const yearContainer = document.getElementById('yearFilter');
      yearContainer.innerHTML = allData.years.map(year => `
        <button class="year-btn px-3 py-1 rounded text-sm font-medium transition
          ${selectedYears.has(year) ? 'bg-cyan-600 text-white' : 'bg-teal-700 text-slate-200 hover:bg-teal-600'}"
          data-year="${year}">${year}</button>
      `).join('');
      
      yearContainer.querySelectorAll('.year-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const year = parseInt(e.target.dataset.year);
          selectedYears.has(year) ? selectedYears.delete(year) : selectedYears.add(year);
          renderFilters();
          render();
        });
      });

      const typeContainer = document.getElementById('typeFilter');
      typeContainer.innerHTML = allData.types.map(type => {
        const color = allData.type_meta[type]?.accent || '#6b7280';
        const isSelected = selectedTypes.has(type);
        return `
          <button class="type-btn px-2 py-1 rounded text-xs font-medium transition flex items-center gap-1"
            data-type="${type}" 
            style="${isSelected 
              ? `background-color: ${color}40; border: 2px solid ${color}; color: ${color}; font-weight: bold;` 
              : `background-color: transparent; border: 1px solid #475569; color: #64748b; opacity: 0.5;`}">
            ● ${type}
          </button>
        `;
      }).join('');

      typeContainer.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const type = e.target.closest('.type-btn').dataset.type;
          selectedTypes.has(type) ? selectedTypes.delete(type) : selectedTypes.add(type);
          renderFilters();
          render();
        });
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        selectedYears = new Set(allData.years);
        const cyclingActivities = ['Ride', 'VirtualRide', 'GravelRide', 'MountainBikeRide', 'EBikeRide'];
        selectedTypes = new Set(allData.types.filter(t => cyclingActivities.includes(t)));
        renderFilters();
        render();
      });

      document.getElementById('toggleDaysBtn').addEventListener('click', () => {
        showAllDays = !showAllDays;
        const btn = document.getElementById('toggleDaysBtn');
        btn.textContent = showAllDays ? 'Všechny dny' : 'Dny s aktivitou';
        btn.style.backgroundColor = showAllDays ? '#334155' : '#1e293b';
        render();
      });
    }

    function render() {
      renderStats();
      renderHeatmaps();
    }

    function renderStats() {
      const stats = { activities: 0, days: 0, distance: 0, time: 0 };
      
      allData.activities.forEach(act => {
        if (selectedYears.has(act.year) && selectedTypes.has(act.type)) {
          stats.activities++;
          stats.days = Math.max(stats.days, new Date(act.date).getDate());
        }
      });

      const container = document.getElementById('statsContainer');
      container.innerHTML = `
        <div class="bg-teal-900 p-4 rounded-lg border border-teal-700">
          <p class="text-slate-200 text-xs uppercase mb-1">Aktivity</p>
          <p class="text-3xl font-bold text-cyan-400">${stats.activities.toLocaleString('cs-CZ')}</p>
        </div>
        <div class="bg-teal-900 p-4 rounded-lg border border-teal-700">
          <p class="text-slate-200 text-xs uppercase mb-1">Aktivní dny</p>
          <p class="text-3xl font-bold text-cyan-400">${new Set(allData.activities.filter(a => selectedYears.has(a.year) && selectedTypes.has(a.type)).map(a => a.date)).size.toLocaleString('cs-CZ')}</p>
        </div>
        <div class="bg-teal-900 p-4 rounded-lg border border-teal-700">
          <p class="text-slate-200 text-xs uppercase mb-1">Let</p>
          <p class="text-3xl font-bold text-cyan-400">${allData.years.filter(y => selectedYears.has(y)).length.toLocaleString('cs-CZ')}</p>
        </div>
        <div class="bg-teal-900 p-4 rounded-lg border border-teal-700">
          <p class="text-slate-200 text-xs uppercase mb-1">Typů</p>
          <p class="text-3xl font-bold text-cyan-400">${allData.types.filter(t => selectedTypes.has(t)).length.toLocaleString('cs-CZ')}</p>
        </div>
      `;
    }

    function renderHeatmaps() {
      const container = document.getElementById('heatmapsContainer');
      const years = [...selectedYears].sort((a, b) => b - a);
      
      if (years.length === 0) {
        container.innerHTML = '<p class="text-slate-200 text-center py-8">Žádná data podle filtrů</p>';
        return;
      }

      container.innerHTML = years.map(year => {
        const yearAgg = allData.aggregates[String(year)] || {};
        const yearActivities = allData.activities.filter(a => a.year === year && selectedTypes.has(a.type));
        
        let totalDistance = 0, totalElevation = 0, totalTime = 0, totalCount = 0;
        Object.entries(yearAgg).forEach(([type, dates]) => {
          if (selectedTypes.has(type)) {
            Object.values(dates).forEach(dayData => {
              totalDistance += dayData.distance || 0;
              totalElevation += dayData.elevation_gain || 0;
              totalTime += dayData.moving_time || 0;
            });
          }
        });

        const dayMap = {};
        yearActivities.forEach(act => {
          if (!dayMap[act.date]) dayMap[act.date] = [];
          dayMap[act.date].push(act.type);
        });

        const dates = Object.keys(dayMap).sort();
        const months = ['Leden', 'Únor', 'Březen', 'Duben', 'Květen', 'Červen', 'Červenec', 'Srpen', 'Září', 'Říjen', 'Listopad', 'Prosinec'];
        const monthsData = {};
        dates.forEach(date => {
          const d = new Date(date + 'T00:00:00Z');
          const month = months[d.getMonth()];
          if (!monthsData[month]) monthsData[month] = [];
          monthsData[month].push({ date, types: dayMap[date] });
        });

        const monthOrder = ['Leden', 'Únor', 'Březen', 'Duben', 'Květen', 'Červen', 'Červenec', 'Srpen', 'Září', 'Říjen', 'Listopad', 'Prosinec'];
        const sortedMonths = monthOrder.filter(m => monthsData[m]);

        const distKm = (totalDistance / 1000).toFixed(0);
        const timeHours = (totalTime / 3600).toFixed(0);

        // Cíl pro 2026
        let goalHtml = '';
        if (year === 2026) {
          const goalDist = 8000;
          const currentDist = totalDistance / 1000;
          const remaining = goalDist - currentDist;
          const daysLeft = Math.ceil((new Date(`${year}-12-31`) - new Date()) / (1000 * 60 * 60 * 24));
          const dailyNeeded = (remaining / daysLeft).toFixed(0);
          const percentage = Math.min((currentDist / goalDist) * 100, 100).toFixed(0);
          
          // Průběžný cíl - kolik bys měl mít dneska
          const yearStart = new Date(`${year}-01-01`);
          const today = new Date();
          const daysElapsed = Math.floor((today - yearStart) / (1000 * 60 * 60 * 24)) + 1;
          const dailyAverage = (goalDist / 365).toFixed(0);
          const shouldHave = (daysElapsed * parseFloat(dailyAverage)).toFixed(0);
          const progressDiff = currentDist - shouldHave;
          const progressDiffColor = progressDiff >= 0 ? 'text-green-400' : 'text-red-400';
          
          goalHtml = `
            <div class="bg-teal-900 p-4 rounded-lg border border-teal-700 mt-6 mb-8">
              <p class="text-slate-200 text-xs uppercase mb-3">🎯 Cíl 2026: ${goalDist.toLocaleString('cs-CZ')}km</p>
              <div class="mb-3">
                <div class="w-full bg-teal-800 rounded-full h-3 overflow-hidden">
                  <div class="bg-gradient-to-r from-cyan-500 to-green-500 h-full" style="width: ${percentage}%"></div>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-4 mb-4">
                <div>
                  <p class="text-xs text-slate-100 mb-1">Postup</p>
                  <p class="text-2xl font-bold text-cyan-400">${parseInt(currentDist).toLocaleString('cs-CZ')}<span class="text-xs text-slate-100"> / ${goalDist.toLocaleString('cs-CZ')}</span></p>
                  <p class="text-xs text-slate-200 mt-1">${percentage}% hotovo</p>
                </div>
                <div>
                  <p class="text-xs text-slate-100 mb-1">Zbývá</p>
                  <p class="text-2xl font-bold ${remaining > 0 ? 'text-amber-400' : 'text-green-400'}">${parseInt(remaining).toLocaleString('cs-CZ')}km</p>
                  <p class="text-xs text-slate-200 mt-1">${daysLeft} dní</p>
                </div>
                <div>
                  <p class="text-xs text-slate-100 mb-1">Denní průměr</p>
                  <p class="text-2xl font-bold text-green-400">${dailyNeeded}km</p>
                  <p class="text-xs text-slate-200 mt-1">do cíle</p>
                </div>
              </div>
              
              <div class="border-t border-teal-700 pt-4">
                <p class="text-xs text-slate-100 mb-3 uppercase">Průběžný cíl (dneska)</p>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <p class="text-xs text-slate-100 mb-1">Měl bys mít</p>
                    <p class="text-lg font-bold text-cyan-400">${parseInt(shouldHave).toLocaleString('cs-CZ')}km</p>
                  </div>
                  <div>
                    <p class="text-xs text-slate-100 mb-1">Máš</p>
                    <p class="text-lg font-bold ${progressDiffColor}">${parseInt(currentDist).toLocaleString('cs-CZ')}km</p>
                    <p class="text-xs ${progressDiffColor} mt-1">${progressDiff >= 0 ? '+' : ''}${parseInt(progressDiff).toLocaleString('cs-CZ')}km</p>
                  </div>
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div>
            <div class="flex items-end justify-between mb-6">
              <div>
                <h2 class="text-2xl font-bold text-white mb-2">${year}</h2>
                <div>
                  <p class="text-xs text-slate-100 uppercase mb-1">📅 Aktivní dny</p>
                  <p class="text-xl font-bold text-cyan-400">${new Set(yearActivities.map(a => a.date)).size.toLocaleString('cs-CZ')}</p>
                  ${year === new Date().getFullYear() ? '<p class="text-xs text-slate-200 mt-1">' + (((new Set(yearActivities.map(a => a.date)).size / (Math.floor((new Date() - new Date(year + '-01-01')) / (1000 * 60 * 60 * 24)) + 1)) * 100).toFixed(0)) + '% k dnešku</p>' : '<p class="text-xs text-slate-200 mt-1">' + (((new Set(yearActivities.map(a => a.date)).size / 365) * 100).toFixed(0)) + '% roku</p>'}
                </div>
              </div>
              <div class="flex gap-6 text-right">
                <div>
                  <p class="text-xs text-slate-100 uppercase mb-1">🏔️ Výška</p>
                  <p class="text-2xl font-bold text-amber-400">${Math.round(totalElevation).toLocaleString('cs-CZ')}m</p>
                </div>
                <div>
                  <p class="text-xs text-slate-100 uppercase mb-1">📍 Vzdálenost</p>
                  <p class="text-2xl font-bold text-cyan-400">${parseInt(distKm).toLocaleString('cs-CZ')}km</p>
                </div>
                <div>
                  <p class="text-xs text-slate-100 uppercase mb-1">⏱️ Čas</p>
                  <p class="text-2xl font-bold text-green-400">${parseInt(timeHours).toLocaleString('cs-CZ')}h</p>
                </div>
              </div>
            </div>
            ${goalHtml}
            <div class="space-y-1 mb-8">
              <!-- Header s měsíci -->
              <div class="flex gap-2 items-start">
                <span class="text-xs text-slate-100 w-20"></span>
                <div class="flex gap-4">
                  ${sortedMonths.map(month => `<span class="text-xs text-slate-100 w-16 text-center">${month}</span>`).join('')}
                </div>
              </div>
              
              <!-- Řádky pro dny v týdnu -->
              ${['Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota', 'Neděle'].map(dayName => {
                const dayIndex = ['Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota', 'Neděle'].indexOf(dayName);
                return `
                  <div class="flex gap-2 items-start">
                    <span class="text-xs text-slate-100 w-20">${dayName}</span>
                    <div class="flex gap-4">
                      ${sortedMonths.map(month => {
                        const monthIndex = months.indexOf(month);
                        const cellsHtml = [];
                        
                        // Pro daný měsíc a den v týdnu
                        if (showAllDays) {
                          const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
                          for (let day = 1; day <= daysInMonth; day++) {
                            const dateObj = new Date(year, monthIndex, day);
                            if (dateObj.getDay() === (dayIndex + 1) % 7) { // Adjust for Sunday = 0
                              const dateStr = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                              const dayData = dayMap[dateStr];
                              if (dayData) {
                                const color = allData.type_meta[dayData[0]]?.accent || '#6b7280';
                                const opacity = Math.min(0.3 + (dayData.length / 3) * 0.7, 1);
                                let allActivityIds = new Set();
                                dayData.forEach(type => {
                                  const agg = yearAgg[type]?.[dateStr];
                                  if (agg?.activity_ids) {
                                    agg.activity_ids.forEach(id => allActivityIds.add(id));
                                  }
                                });
                                cellsHtml.push(`<div class="cell" style="background-color: ${color}; opacity: ${opacity}" 
                                  title="${dateStr}: ${dayData.join(', ')}"
                                  data-date="${dateStr}"
                                  data-activities="${Array.from(allActivityIds).join(',')}"
                                  data-types="${dayData.join(',')}"></div>`);
                              } else {
                                cellsHtml.push(`<div class="cell" style="background-color: #4b5563; opacity: 0.2"></div>`);
                              }
                            }
                          }
                        } else {
                          // Jen dny s aktivitou
                          (monthsData[month] || []).forEach(day => {
                            const dateObj = new Date(day.date + 'T00:00:00Z');
                            if (dateObj.getDay() === (dayIndex + 1) % 7) {
                              const color = allData.type_meta[day.types[0]]?.accent || '#6b7280';
                              const opacity = Math.min(0.3 + (day.types.length / 3) * 0.7, 1);
                              let allActivityIds = new Set();
                              day.types.forEach(type => {
                                const agg = yearAgg[type]?.[day.date];
                                if (agg?.activity_ids) {
                                  agg.activity_ids.forEach(id => allActivityIds.add(id));
                                }
                              });
                              cellsHtml.push(`<div class="cell" style="background-color: ${color}; opacity: ${opacity}" 
                                title="${day.date}: ${day.types.join(', ')}"
                                data-date="${day.date}"
                                data-activities="${Array.from(allActivityIds).join(',')}"
                                data-types="${day.types.join(',')}"></div>`);
                            }
                          });
                        }
                        
                        return `<div class="flex gap-0.5">${cellsHtml.join('')}</div>`;
                      }).join('')}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      // Event listenery na čtvereččky
      setTimeout(() => {
        document.querySelectorAll('.cell').forEach(cell => {
          cell.addEventListener('click', (e) => {
            const activities = cell.dataset.activities.split(',').filter(Boolean);
            if (activities.length === 0) return;
            
            if (activities.length === 1) {
              window.open(`https://www.strava.com/activities/${activities[0]}`, '_blank');
            } else {
              showActivityMenu(e, activities);
            }
          });
        });
      }, 0);
    }

    function showActivityMenu(e, activityIds) {
      // Smaž staré menu
      const oldMenu = document.querySelector('.activity-menu');
      if (oldMenu) oldMenu.remove();
      
      const menu = document.createElement('div');
      menu.className = 'activity-menu';
      menu.style.left = (e.clientX) + 'px';
      menu.style.top = (e.clientY) + 'px';
      
      menu.innerHTML = activityIds.map((id, idx) => `
        <div class="activity-menu-item" onclick="window.open('https://www.strava.com/activities/${id}', '_blank'); this.closest('.activity-menu').remove();">
          Aktivita ${idx + 1}
        </div>
      `).join('');
      
      document.body.appendChild(menu);
      
      // Zavřít menu při kliknutí jinde
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!e.target.closest('.activity-menu') && !e.target.closest('.cell')) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 0);
    }

    init();
  </script>
</body>
</html>
