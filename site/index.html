<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>git-sweaty | Activity Heatmaps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .cell { width: 14px; height: 14px; border-radius: 2px; cursor: pointer; transition: all 0.2s; }
    .cell:hover { transform: scale(1.3); opacity: 1 !important; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 pb-6 border-b border-slate-700">
      <h1 class="text-4xl font-bold text-white mb-2">Activity Heatmaps</h1>
      <p class="text-slate-400">Přehled mých aktivit</p>
    </header>

    <!-- FILTRY -->
    <aside class="mb-8 p-4 bg-slate-900 rounded-lg border border-slate-700">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <h3 class="text-sm font-semibold text-slate-300 uppercase mb-3">Roky</h3>
          <div id="yearFilter" class="flex flex-wrap gap-2"></div>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-300 uppercase mb-3">Aktivita</h3>
          <div id="typeFilter" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto"></div>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-300 uppercase mb-3">Akce</h3>
          <button id="resetBtn" class="px-4 py-2 bg-red-900 text-red-100 rounded hover:bg-red-800 text-sm font-medium">
            Reset
          </button>
        </div>
      </div>
    </aside>

    <!-- STATISTIKY -->
    <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

    <!-- HEATMAPY -->
    <div id="heatmapsContainer" class="space-y-8"></div>

    <!-- FOOTER -->
    <footer class="text-center text-sm text-slate-500 py-8 border-t border-slate-700 mt-12">
      Powered by <a href="https://github.com/aspain/git-sweaty" class="text-cyan-400 hover:text-cyan-300">git-sweaty</a>
    </footer>
  </div>

  <script>
    let allData = {};
    let selectedYears = new Set();
    let selectedTypes = new Set();

    async function init() {
      const res = await fetch('data.json');
      allData = await res.json();
      
      selectedYears = new Set(allData.years);
      
      // Výchozí: pouze cyklistické aktivity
      const cyclingActivities = ['Ride', 'VirtualRide', 'GravelRide', 'MountainBikeRide', 'EBikeRide'];
      selectedTypes = new Set(allData.types.filter(t => cyclingActivities.includes(t)));
      
      renderFilters();
      render();
    }

    function renderFilters() {
      const yearContainer = document.getElementById('yearFilter');
      yearContainer.innerHTML = allData.years.map(year => `
        <button class="year-btn px-3 py-1 rounded text-sm font-medium transition
          ${selectedYears.has(year) ? 'bg-cyan-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}"
          data-year="${year}">${year}</button>
      `).join('');
      
      yearContainer.querySelectorAll('.year-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const year = parseInt(e.target.dataset.year);
          selectedYears.has(year) ? selectedYears.delete(year) : selectedYears.add(year);
          renderFilters();
          render();
        });
      });

      const typeContainer = document.getElementById('typeFilter');
      typeContainer.innerHTML = allData.types.map(type => {
        const color = allData.type_meta[type]?.accent || '#6b7280';
        const isSelected = selectedTypes.has(type);
        return `
          <button class="type-btn px-2 py-1 rounded text-xs font-medium transition flex items-center gap-1"
            data-type="${type}" 
            style="${isSelected 
              ? `background-color: ${color}40; border: 2px solid ${color}; color: ${color}; font-weight: bold;` 
              : `background-color: transparent; border: 1px solid #475569; color: #64748b; opacity: 0.5;`}">
            ● ${type}
          </button>
        `;
      }).join('');

      typeContainer.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const type = e.target.closest('.type-btn').dataset.type;
          selectedTypes.has(type) ? selectedTypes.delete(type) : selectedTypes.add(type);
          renderFilters();
          render();
        });
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        selectedYears = new Set(allData.years);
        const cyclingActivities = ['Ride', 'VirtualRide', 'GravelRide', 'MountainBikeRide', 'EBikeRide'];
        selectedTypes = new Set(allData.types.filter(t => cyclingActivities.includes(t)));
        renderFilters();
        render();
      });
    }

    function render() {
      renderStats();
      renderHeatmaps();
    }

    function renderStats() {
      const stats = { activities: 0, days: 0, distance: 0, time: 0 };
      
      allData.activities.forEach(act => {
        if (selectedYears.has(act.year) && selectedTypes.has(act.type)) {
          stats.activities++;
          stats.days = Math.max(stats.days, new Date(act.date).getDate());
        }
      });

      const container = document.getElementById('statsContainer');
      container.innerHTML = `
        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
          <p class="text-slate-400 text-xs uppercase mb-1">Aktivity</p>
          <p class="text-3xl font-bold text-cyan-400">${stats.activities}</p>
        </div>
        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
          <p class="text-slate-400 text-xs uppercase mb-1">Aktivní dny</p>
          <p class="text-3xl font-bold text-cyan-400">${new Set(allData.activities.filter(a => selectedYears.has(a.year) && selectedTypes.has(a.type)).map(a => a.date)).size}</p>
        </div>
        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
          <p class="text-slate-400 text-xs uppercase mb-1">Let</p>
          <p class="text-3xl font-bold text-cyan-400">${allData.years.filter(y => selectedYears.has(y)).length}</p>
        </div>
        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
          <p class="text-slate-400 text-xs uppercase mb-1">Typů</p>
          <p class="text-3xl font-bold text-cyan-400">${allData.types.filter(t => selectedTypes.has(t)).length}</p>
        </div>
      `;
    }

    function renderHeatmaps() {
      const container = document.getElementById('heatmapsContainer');
      const years = [...selectedYears].sort((a, b) => b - a);
      
      if (years.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-center py-8">Žádná data podle filtrů</p>';
        return;
      }

      container.innerHTML = years.map(year => {
        const yearAgg = allData.aggregates[year] || {};
        const yearActivities = allData.activities.filter(a => a.year === year && selectedTypes.has(a.type));
        
        // Agreguj statistiky za rok
        let totalDistance = 0, totalElevation = 0, totalTime = 0, totalCount = 0;
        Object.values(yearAgg).forEach(typeData => {
          Object.values(typeData).forEach(dayData => {
            if (selectedTypes.has(Object.keys(yearAgg).find(t => yearAgg[t][Object.keys(yearAgg[t])[0]] === dayData))) {
              totalDistance += dayData.distance || 0;
              totalElevation += dayData.elevation_gain || 0;
              totalTime += dayData.moving_time || 0;
              totalCount += dayData.count || 0;
            }
          });
        });

        // Spočítej z filtrovaných aktivit místo
        totalDistance = 0;
        totalElevation = 0;
        totalTime = 0;
        totalCount = yearActivities.length;
        
        Object.entries(yearAgg).forEach(([type, dates]) => {
          if (selectedTypes.has(type)) {
            Object.values(dates).forEach(dayData => {
              totalDistance += dayData.distance || 0;
              totalElevation += dayData.elevation_gain || 0;
              totalTime += dayData.moving_time || 0;
            });
          }
        });

        const dayMap = {};
        yearActivities.forEach(act => {
          if (!dayMap[act.date]) dayMap[act.date] = [];
          dayMap[act.date].push(act.type);
        });

        const dates = Object.keys(dayMap).sort();
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const monthsData = {};
        dates.forEach(date => {
          const d = new Date(date + 'T00:00:00Z');
          const month = months[d.getMonth()];
          if (!monthsData[month]) monthsData[month] = [];
          monthsData[month].push({ date, types: dayMap[date] });
        });

        const monthOrder = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const sortedMonths = monthOrder.filter(m => monthsData[m]);

        const distKm = (totalDistance / 1000).toFixed(0);
        const timeHours = (totalTime / 3600).toFixed(0);

        return `
          <div>
            <div class="flex items-end justify-between mb-6">
              <h2 class="text-2xl font-bold text-white">${year}</h2>
              <div class="flex gap-6 text-right">
                <div>
                  <p class="text-xs text-slate-500 uppercase mb-1">🏔️ Výška</p>
                  <p class="text-2xl font-bold text-amber-400">${(totalElevation / 1000).toFixed(1)}km</p>
                </div>
                <div>
                  <p class="text-xs text-slate-500 uppercase mb-1">📍 Vzdálenost</p>
                  <p class="text-2xl font-bold text-cyan-400">${distKm}km</p>
                </div>
                <div>
                  <p class="text-xs text-slate-500 uppercase mb-1">⏱️ Čas</p>
                  <p class="text-2xl font-bold text-green-400">${timeHours}h</p>
                </div>
              </div>
            </div>
            <div class="space-y-2 mb-8">
              ${sortedMonths.map(month => `
                <div class="flex gap-2 items-start">
                  <span class="text-xs text-slate-500 w-12">${month}</span>
                  <div class="flex gap-1 flex-wrap">
                    ${monthsData[month].map(day => {
                      const color = allData.type_meta[day.types[0]]?.accent || '#6b7280';
                      const opacity = Math.min(0.3 + (day.types.length / 3) * 0.7, 1);
                      return `<div class="cell" style="background-color: ${color}; opacity: ${opacity}" title="${day.date}: ${day.types.join(', ')}"></div>`;
                    }).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
